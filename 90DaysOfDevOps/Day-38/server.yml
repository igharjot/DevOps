server:

  name: mysql

  ip: 192.0.0.1

  port: 80

  startup_script1: |
    #!/bin/bash
    echo "Starting application..."
    npm install
    npm run build
    npm start
  
  startup_script2: >
    #!/bin/bash
    set -u
    echo "Updating the system and Installing Docker..."
    sudo apt-get update
    sudo apt install docker.io
    systemctl status docker
    systemctl start docker
    systemctl enable docker
    systemctl is-enabled docker


