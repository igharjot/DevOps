apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp-deployment
  namespace: bank-app
  labels:
    app: bankapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bankapp
  template:
    metadata:
      labels:
        app: bankapp
    spec:
      containers:
        - name: bankapp
          image: trainwithshubham/ai-bankapp:k8s
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: bankapp-config-map

            - secretRef:
                name: bankapp-secrets      
