kind: Service
apiVersion: v1
metadata:
  name: mysql-service
  namespace: bank-app
spec:
  selector:
    app: mysql
  ports:
    - port: 3306

---

kind: Service
apiVersion: v1
metadata:
  name: bankapp-service
  namespace: bank-app
spec:
  selector:
    app: bankapp
  ports:
    - port: 8080
      targetPort: 8080
  type: NodePort
